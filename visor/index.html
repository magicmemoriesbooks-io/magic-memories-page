<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Memories Books - Tu Cuento</title>
    <meta name="description" content="Lee tu cuento personalizado de Magic Memories Books">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="Magic Memories Books - Tu Cuento">
    <meta property="og:description" content="Lee tu cuento personalizado de Magic Memories Books">
    <meta property="og:image" content="https://magicmemoriesbooks.com/static/images/logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="https://magicmemoriesbooks.com/static/images/logo.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="loading-screen" id="loading-screen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Preparando tu cuento...</div>
    </div>

    <div class="error-screen" id="error-screen" style="display:none">
        <div class="error-icon">
            <svg viewBox="0 0 80 80" width="80" height="80"><path d="M10 15 Q40 5 40 40 Q40 5 70 15 L70 65 Q40 55 40 65 Q40 55 10 65 Z" fill="none" stroke="#E130D0" stroke-width="2.5" stroke-linecap="round"/><path d="M40 40 L40 65" stroke="#E130D0" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div class="error-title">Tu libro se esta preparando</div>
        <div class="error-message">Estamos creando tu cuento con mucho carino.<br>Vuelve pronto para disfrutarlo.<br><br>Si ya deberia estar listo, contacta a<br><strong>info@magicmemoriesbooks.com</strong></div>
        <a href="/" class="error-home-btn">Volver al inicio</a>
    </div>

    <div class="visor" id="visor" style="display:none">
        <div class="overlay-brand">
            <img src="images/logo_mmb.png" alt="Magic Memories Books" class="overlay-logo" onerror="this.style.display='none'">
            <span class="brand-name">Magic Memories Books</span>
        </div>

        <div class="overlay-title" id="book-title"></div>

        <div class="book-stage">
            <button class="nav-arrow nav-left" id="btn-prev" disabled>
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="book-frame" id="book-frame">
                <div id="flipbook"></div>
                <div class="spine-shadow"></div>
            </div>
            <button class="nav-arrow nav-right" id="btn-next">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>

        <div class="bottom-bar">
            <div class="bottom-left">
                <span class="page-indicator" id="page-indicator">1 / 1</span>
            </div>
            <div class="bottom-center">
                <span class="hint-label" id="hint-audio-text">Audiolibro</span>
                <button class="fab-btn" id="tts-play-btn" title="Narrar cuento">
                    <svg class="ic-play" viewBox="0 0 24 24" width="24" height="24" fill="white"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                    <svg class="ic-pause" viewBox="0 0 24 24" width="24" height="24" fill="white" style="display:none"><rect x="5" y="3" width="5" height="18" rx="1"/><rect x="14" y="3" width="5" height="18" rx="1"/></svg>
                </button>
                <span class="hint-label" id="hint-music-text">Musica</span>
            </div>
            <div class="bottom-right">
                <button class="tool-btn" id="btn-music" title="Musica">
                    <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                </button>
                <button class="tool-btn" id="btn-zoom" title="Zoom">
                    <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
                <button class="tool-btn" id="btn-fullscreen" title="Pantalla completa">
                    <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                </button>
                <button class="tool-btn" id="btn-download" title="Descargar PDF" style="display:none">
                    <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="zoom-overlay" id="zoom-overlay">
        <button class="zoom-close" id="zoom-close">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <img id="zoom-image" src="" alt="Zoom">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
